spring.application.name=file-service
server.port=8088
server.servlet.context-path=/files

# DATABASE
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5437/file_database}
spring.datasource.username=${DATASOURCE_USERNAME:rota-facil}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}

# JPA + HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.log-resolvers=true

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.client.fetch-registry=true

# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}


# RABBITMQ FILE
rabbitmq.file.exchange=${RABBITMQ_FILE_EXCHANGE:file.events}
rabbitmq.file.created.routing.key=${RABBITMQ_FILE_CREATED_ROUTING_KEY:file.created.routing.key}
rabbitmq.file.updated.routing.key=${RABBITMQ_FILE_UPDATED_ROUTING_KEY:file.updated.routing.key}
rabbitmq.file.deleted.routing.key=${RABBITMQ_FILE_DELETED_ROUTING_KEY:file.deleted.routing.key}


# RABBITMQ AUTH
rabbitmq.auth.exchange=${RABBITMQ_AUTH_EXCHANGE:auth.events}
# queues
rabbitmq.file.user.deleted.queue=${RABBITMQ_FILE_USER_DELETED_QUEUE:file.user.deleted.queue}
rabbitmq.file.prefecture.deleted.queue=${RABBITMQ_FILE_PREFECTURE_DELETED_QUEUE:file.prefecture.deleted.queue}
# routing keys
rabbitmq.file.user.deleted.routing.key=${RABBITMQ_USER_DELETED_ROUTING_KEY:user.deleted}
rabbitmq.file.prefecture.deleted.routing.key=${RABBITMQ_PREFECTURE_DELETED_ROUTING_KEY:prefecture.deleted}


# RABBITMQ PLACES
rabbitmq.places.exchange=${RABBITMQ_PLACES_EXCHANGE:places.events}
# queues
rabbitmq.file.institution.deleted.queue=${RABBITMQ_FILE_INSTITUTION_DELETED_QUEUE:file.institution.deleted.queue}
rabbitmq.file.boarding.deleted.queue=${RABBITMQ_FILE_BOARDING_DELETED_QUEUE:file.boarding.deleted.queue}
#  routing keys
rabbitmq.institution.deleted.routing.key=${RABBITMQ_INSTITUTION_DELETED_ROUTING_KEY:institution.deleted.routing.key}
rabbitmq.boarding.deleted.routing.key=${RABBITMQ_BOARDING_DELETED_ROUTING_KEY:boarding.deleted.routing.key}


# RABBITMQ TRANSPORT
rabbitmq.transport.exchange=${RABBITMQ_TRANSPORT_EXCHANGE:transport.events}
# queues
rabbitmq.file.bus.deleted.queue=${RABBITMQ_FILE_BUS_DELETED_QUEUE:file.bus.deleted.queue}
# routing keys
rabbitmq.bus.deleted.routing.key=${RABBITMQ_BUS_DELETED_ROUTING_KEY:bus.deleted.routing.key}